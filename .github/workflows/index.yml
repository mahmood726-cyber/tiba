name: Build Tiba index page

on:
  push:
    branches: [main]
  schedule:
    # Re-verify federation HTTP-200 status weekly (R2 long-term mitigation)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Authenticate gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Build index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m tiba.generator.build_index --output site/index.html

      - name: Run tests
        run: python -m pytest -q

      - name: Commit regenerated index.html if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html
          if git diff --cached --quiet; then
            echo "no index changes"
          else
            git commit -m "ci: regenerate site/index.html [skip ci]"
            git push
          fi
